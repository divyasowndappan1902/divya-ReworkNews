<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Stackly</title>
    <link rel="icon" type="image/x-icon" href="logo-stackly (1).png"><link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card animate">
            <a href="index.html" class="home-btn-pill">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                Home
            </a>

            <div style="text-align: center; margin-bottom: 2rem;">
                <img src="logo-stackly (1).png" alt="Stackly Logo" style="height: 54px; width: auto; margin-bottom: 1.5rem;">
                <h2 style="font-size: 2.2rem; font-weight: 900; color: #0b1120; margin-bottom: 0.5rem; letter-spacing: -0.5px;">Welcome Back</h2>
                <p style="color: #64748b; font-size: 1rem; font-weight: 500;">Login to access your Stackly account</p>
            </div>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="role">Login As</label>
                    <div class="input-icon-wrapper">
                        <select id="role" required style="padding-left: 1.2rem; appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%2364748b%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C/polyline%3E%3C/svg%3E'); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1.2em auto;">
                            <option value="admin">Admin</option>
                            <option value="customer">Customer</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-icon-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-icon-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <input type="password" id="password" placeholder="••••••••" required>
                        <svg class="input-icon-right" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; font-size: 0.95rem;">
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; color: #475569; font-weight: 500;">
                        <input type="checkbox" style="width: 18px; height: 18px; cursor: pointer; accent-color: #6366f1;"> Remember me
                    </label>
                    <a href="404.html" style="color: #6366f1; text-decoration: none; font-weight: 700;">Forgot password?</a>
                </div>

                <button type="submit" class="btn-auth-gradient">Login to Dashboard</button>
            </form>

            <div style="margin-top: 3rem; text-align: center; color: #64748b;">
                <p style="font-weight: 500;">Don't have an account? <a href="signup.html" style="color: #6366f1; font-weight: 800; text-decoration: none;">Sign up</a></p>
            </div>
        </div>
    </div>

    <script src="common.js"></script>
</body>
</html>
